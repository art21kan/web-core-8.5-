<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
/>
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    
</head>
<body>
    <section>
        <div class="caption">РЕМОНТ ТЕХНИКИ РАЗЛИЧНЫХ БРЕНДОВ</div>

        <div class="brand" id="brandGrid">
            <div class="brand__logo">
            <img src="Logos/Bitmap.png" alt="lenovo logo">
            <img src="Icons/go.svg" alt="arrow">
            </div>

            <div class="brand__logo">
            <img  src="Logos/Bitmap (2).png" alt="samsung logo">
            <img src="Icons/go.svg" alt="arrow">
            </div>

            <div class="brand__logo">
            <img  src="Logos/bitmap apple.png" alt="apple logo">
            <img src="Icons/go.svg" alt="arrow">
            </div>

            <div class="brand__logo brand__logo--viewsonic">
            <img src="Logos/Bitmap (5).png" alt="viewsonic logo">
            <img src="Icons/go.svg" alt="arrow">
            </div>

            <div class="brand__logo">
            <img src="Logos/Bitmap (1).png" alt="bosch logo">
            <img src="Icons/go.svg" alt="arrow">
            </div>

            <div class="brand__logo">
            <img  src ="Logos/Bitmap (3).png" alt="hp logo">
            <img src="Icons/go.svg" alt="arrow">
            </div>

            <div class="brand__logo">
            <img src="Logos/Bitmap (4).png" alt="acer logo">
            <img src="Icons/go.svg" alt="arrow">
            </div>

            <div class="brand__logo brand__logo--sony">
            <img src="Logos/Bitmap (6).png" alt="sony logo">
            <img src="Icons/go.svg" alt="arrow">
            </div>
            
            <div class="brand__logo hidden">
            <img src="Logos/Bitmap.png" alt="lenovo logo">
            <img src="Icons/go.svg" alt="arrow">
            </div>

            <div class="brand__logo hidden">
            <img  src="Logos/Bitmap (2).png" alt="samsung logo">
            <img src="Icons/go.svg" alt="arrow">
            </div>

            <div class="brand__logo hidden">
            <img  src="Logos/bitmap apple.png" alt="apple logo">
            <img src="Icons/go.svg" alt="arrow">
            </div>
        </div>

        <div class="show" id="showButton">
            <img src="Icons/expand.svg" alt="show">
            <span>Показать все</span>
        </div>
    
<div class="swiper">
<div class="swiper-wrapper">
    <div class="swiper-slide">
            <img src="Logos/Bitmap.png" alt="lenovo logo">
            <img src="Icons/go.svg" alt="arrow">
    </div>
    <div class="swiper-slide">
            <img  src="Logos/Bitmap (2).png" alt="samsung logo">
            <img src="Icons/go.svg" alt="arrow">
    </div>
    <div class="swiper-slide">
            <img  src="Logos/bitmap apple.png" alt="apple logo">
            <img src="Icons/go.svg" alt="arrow">
    </div>
</div>
</div>
</section>
<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
